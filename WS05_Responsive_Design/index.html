<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Design</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Trollauslinkit</h1>
      <nav class="responsive-nav">
        <input type="checkbox" id="menu-toggle" />

        <label for="menu-toggle" class="menu-icon"> ☰ Navigointi </label>
        <ul class="nav-list">
          <li><a href="#">Testi</a></li>
          <li><a href="#">Testi2</a></li>
          <li><a href="#">Testi3</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section id="donkey">
        <h2>Tässä alhaalla on boxeja</h2>
        <p>Näätkö nämä nätit boxit?</p>

        <div class="grid-container">
          <div class="grid-item">Kissa</div>
          <div class="grid-item">Koira</div>
          <div class="grid-item">Kääpä</div>
          <div class="grid-item">Lehmä</div>
          <div class="grid-item">Kenguru</div>
          <div class="grid-item">Valaskoira</div>
        </div>

        <div class="flex-container">
          <div class="box">Linux</div>
          <div class="box">Windows</div>
          <div class="box">macOS</div>
        </div>
      </section>

      <div class="responsive-container">
        <div class="column">Testaus 1</div>
        <div class="column">Testataan 2</div>
      </div>

      <img
        src="Kuvia/Norppa.jpg"
        alt="Responsive Image"
        class="responsive-image"
      />

      <div class="media-query-box">
        Jos venytät tätä niin käy hassusti myös :D
      </div>

      <div class="responsive-box">Jos venytät tätä niin käy hassusti :D</div>
    </main>

    <footer>
      <p>Copyright MiauMiau Corp 2026</p>
    </footer>
  </body>
</html>
