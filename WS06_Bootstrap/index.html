<!doctype html>
<html>
  <head>
    <title>Bootstrapin testausta</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap JavaScript (place before closing </body> tag) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </head>

  <body>
    <h1>Tervetuloa tänne</h1>
    <p>Dolor ipsum dolor sit amet, consectetur adipiscing elit.</p>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Meikäläinen</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="#">Koti</a>
            </li>
            <li class="nav-item"><a class="nav-link" href="#">UKK</a></li>
            <li class="nav-item">
              <a class="nav-link" href="#">Yhteystiedot</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <div class="container">
      <div class="row">
        <div class="col-md-4 col-12">Kissa</div>
        <div class="col-md-4 col-12">Koira</div>
        <div class="col-md-4 col-12">Kana</div>
      </div>
    </div>
    <div class="card" style="width: 18rem">
      <img src="kuvat/cj.png" class="card-img-top" alt="Card Image" />
      <div class="card-body">
        <h5 class="card-title">Card Title</h5>
        <p class="card-text">This is a simple card example using Bootstrap.</p>
        <a href="#" class="btn btn-primary">Learn More</a>
      </div>
    </div>
    <button class="btn btn-primary">Sininen</button>
    <button class="btn btn-secondary">Harmaa</button>
    <button class="btn btn-success">Vihreä</button>
    <div class="alert alert-info" role="alert">
      Tämän pitäisi olla sininen hälytys, mutta ei ole :D
    </div>
  </body>
</html>
